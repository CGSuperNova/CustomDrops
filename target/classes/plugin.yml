name: CustomDrops
version: 1.0.2
main: org.example.com.customDrops.CustomDropsPlugin
api-version: 1.13
description: 自定义方块掉落物插件
author: buzizi
commands:
  customdrops:
    description: CustomDrops 主命令
    usage: /customdrops <reload|list> [页码]
    permission: customdrops.use
    aliases: [cd]

permissions:
  customdrops.use:
    description: 允许使用 /customdrops 命令
    default: true
  customdrops.reload:
    description: 允许重载配置文件
    default: op
    children:
      customdrops.use: true
  customdrops.list:
    description: 允许查看配置列表
    default: op
    children:
      customdrops.use: true
  customdrops.update:
    description: 接收更新通知
    default: op